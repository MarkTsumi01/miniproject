version: '3.8'
services:
  php-apache-environment:
    container_name: php-apache
    image: php:7.1-apache
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - mysql
    volumes:
      - .:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini 
    ports:
      - 8888:80
    networks:
      - laravel_pms
  mysql:
    container_name: mysql
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password #
#    volumes:
#      - ./db:/var/lib/mysql  # modify as needed!
    restart: always
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pms
      MYSQL_USER: user
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    # add more db as require
    networks:
      - laravel_pms
  # add phpmyadmin as a default
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8000:80"
    restart: always
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - laravel_pms
networks:
  laravel_pms:
    driver: bridge
